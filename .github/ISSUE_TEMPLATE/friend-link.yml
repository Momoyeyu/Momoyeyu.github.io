name: 友链申请
description: 申请交换友情链接
title: "[友链申请]"
labels: ["友链申请"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的友链申请！请在提交前确认：
        1. 已将本站添加到你的友链页面
        2. 站点支持 HTTPS 访问
        3. 内容积极合法，无违规信息

        长期无法访问或内容违规的友链将被移除。
  - type: input
    id: name
    attributes:
      label: 站点名称
      placeholder: ex. 夜羽的小作坊
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: 站点链接
      description: 请带上 https:// 协议头
      placeholder: ex. https://momoyeyu.github.io
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: 站点描述
      placeholder: ex. Code Is Elegant
    validations:
      required: true
  - type: input
    id: avatar
    attributes:
      label: 头像链接
      description: 请提供一个稳定可访问的图片 URL
      placeholder: ex. https://momoyeyu.github.io/avatar.jpg
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: 请确认
      options:
        - label: 我已将「夜羽的小作坊」添加到我的友链页面
          required: true
        - label: 我的站点支持 HTTPS 访问
          required: true
        - label: 我的站点内容积极合法
          required: true
